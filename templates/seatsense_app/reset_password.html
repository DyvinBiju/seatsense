{% extends "seatsense_app/base.html" %}

{% block content %}
<section class="section pt-5 pb-5" style="margin-top: 100px;">
<div class="container text-center">

<div class="mb-5">
    <h2 class="mb-2" style="font-weight: 700; color: #202124;">Create New Password</h2>
    <p style="color: #5f6368; font-size: 16px;">Step 2: Securing account for <strong>{{ reset_user.username }}</strong></p>
</div>

<div class="auth-card mx-auto text-left">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert" style="border-radius: 12px;">
                {{ message }}
                <button type="button" class="close" data-dismiss="alert" aria-label="Close" style="padding: 10px 15px;">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
        {% endfor %}
    {% endif %}
    
    <form method="POST">
        {% csrf_token %}
        <div class="form-group mb-4">
            <label class="field-label">New Password</label>
            <input type="password" name="new_password" required minlength="8" placeholder="At least 8 characters" class="form-control">
        </div>
        
        <div class="form-group mb-4">
            <label class="field-label">Confirm New Password</label>
            <input type="password" name="confirm_password" required minlength="8" placeholder="Repeat new password" class="form-control">
        </div>

        <button type="submit" class="btn btn-main-md auth-btn w-100 mt-2">
            Change Password <i class="fa fa-key ml-2"></i>
        </button>
    </form>
</div>

</div>
</section>

<style>
.auth-card {
    max-width: 450px;
    background: #ffffff;
    border-radius: 24px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.04);
    border: 1px solid #eef0f2;
    padding: 40px 30px;
}
.field-label {
    color: #3c4043;
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 8px;
    display: block;
}
.auth-card input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid #dadce0;
    background-color: #f8f9fa;
}
.auth-btn {
    padding: 14px 20px;
    font-size: 16px;
    border-radius: 30px;
    font-weight: 600;
    background-color: #f97316;
    color: white;
    border: none;
}
</style>
{% endblock %}
