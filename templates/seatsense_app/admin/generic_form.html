{% extends "seatsense_app/admin/admin_base.html" %}

{% block page_title %}{{ title }}{% endblock %}

{% block admin_content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card content-card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0" style="font-weight: 700;">{{ title }}</h5>
            </div>
            <div class="card-body p-4 p-md-5">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    {% for field in form %}
                    <div class="form-group mb-4">
                        <label class="field-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
                    </div>
                    {% endfor %}

                    <div class="mt-4 pt-4 border-top">
                        <button type="submit" class="btn btn-orange-custom py-2 px-5">
                            <i class="fa fa-save mr-2"></i> Save
                        </button>
                        <a href="{% url back_url %}" class="btn btn-light py-2 ml-2">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .content-card { border-radius: 16px; }
    .field-label { font-weight: 600; font-size: 14px; color: #4b5563; margin-bottom: 8px; }
    .btn-orange-custom { background: #f97316; color: white; border-radius: 10px; font-weight: 600; padding: 10px 20px; border: none; }
</style>
{% endblock %}
