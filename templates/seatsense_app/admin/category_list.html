{% extends "seatsense_app/admin/admin_base.html" %}

{% block page_title %}Categories manager{% endblock %}

{% block admin_content %}
<div class="row mb-4 align-items-center">
    <div class="col-md-4">
        <h4 class="mb-0" style="font-weight: 700; color: #111827;">All Categories</h4>
    </div>
    <div class="col-md-8 text-right d-flex justify-content-end align-items-center">
        <form class="mr-2" method="GET">
            <div class="input-group">
                <input type="text" name="q" class="form-control" placeholder="Search categories..." value="{{ search_query|default:'' }}" style="border-radius: 10px 0 0 10px;">
                <div class="input-group-append">
                    <button class="btn btn-light bg-white border-left-0" style="border: 1px solid #ced4da; border-left: none; border-radius: 0 10px 10px 0;" type="submit">
                        <i class="fa fa-search text-muted"></i>
                    </button>
                </div>
            </div>
        </form>
        <a href="{% url 'admin_category_create' %}" class="btn btn-orange-custom">
            <i class="fa fa-plus mr-2"></i> Add Category
        </a>
    </div>
</div>

<div class="row">
    <div class="col-lg-6">
        <div class="card content-card border-0 shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="thead-light">
                        <tr>
                            <th class="border-0 px-4">Name</th>
                            <th class="border-0 text-right px-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for cat in categories %}
                        <tr>
                            <td class="px-4 py-3 align-middle font-weight-bold">{{ cat.name }}</td>
                            <td class="py-3 align-middle text-right px-4">
                                <a href="{% url 'admin_category_edit' cat.id %}" class="btn btn-light btn-sm mr-1"><i class="fa fa-edit text-info"></i></a>
                                <a href="{% url 'admin_category_delete' cat.id %}" class="btn btn-light btn-sm" onclick="return confirm('Delete this category?')"><i class="fa fa-trash text-danger"></i></a>
                            </td>
                        </tr>
                        {% empty %}
                        <tr><td colspan="2" class="text-center py-4">No categories.</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<style>
    .btn-orange-custom { background: #f97316; color: white; border-radius: 10px; font-weight: 600; padding: 10px 20px; border: none; }
    .content-card { border-radius: 16px; }
</style>
{% endblock %}
